name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
      - name: Show build output
        run: |
          echo "=== index.html locations ==="
          find . -name "index.html" -not -path "*/node_modules/*" -not -path "*/.git/*" 2>/dev/null || echo "none found"
          echo "=== .output/ tree ==="
          ls -la .output/ 2>/dev/null || echo ".output/ not found"
          echo "=== dist/ tree ==="
          ls -la dist/ 2>/dev/null || echo "dist/ not found"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
